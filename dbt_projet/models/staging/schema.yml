version: 2

models:
  - name: stg_orders
    description: "Commandes nettoyées et typées (source MinIO)"
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: [delivered, shipped, pending, cancelled]
      - name: total_amount
        tests: [not_null]

  - name: stg_order_items
    description: "Lignes de commande nettoyées (source MinIO)"
    columns:
      - name: item_id
        tests: [not_null, unique]
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: quantity
        tests: [not_null]

  - name: stg_customers
    description: "Clients nettoyés (source PostgreSQL)"
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: email
        tests: [not_null, unique]

  - name: stg_products
    description: "Produits nettoyés (source PostgreSQL)"
    columns:
      - name: product_id
        tests: [not_null, unique]
      - name: product_name
        tests: [not_null]
