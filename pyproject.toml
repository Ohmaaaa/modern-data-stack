[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]   # pycodestyle + pyflakes + isort
ignore = ["E501"]                # longueur déjà gérée par line-length

[tool.ruff.lint.per-file-ignores]
"dbt_projet/**" = ["ALL"]        # les fichiers .sql dbt ne sont pas du Python
